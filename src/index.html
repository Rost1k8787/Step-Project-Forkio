<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forkio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet">
    <link rel="icon" href="../dist/img/navbar-logo.png" type="image/x-icon"/>
    <link rel="stylesheet" href="../dist/css/styles.min.css">
</head>

<body>
<main class="main">
<section class="revolutionary-section">
    <div class="container">
        <div class="content-revolutionary">
            <h2 class="section-title revolution-header">
    Revolutionary editor
            </h2>
            <p class="information-about-revolutionary">
                Aenean cursus imperdiet nisl id fermentum. Aliquam pharetra dui laoreet vulputate dignissim. Sed id metus id quam auctor molestie eget ut augue.
            </p>
            <ul class="actions">
                <li class="actions-item">
                    <button class="btns all-btns">
                        <div class="btns-side">
                            <img src="../dist/img/Revolutionary-Editor/eye.svg">
                            <span class="text">Watch</span>
                        </div>
                        <span class="value">1,379</span>
                    </button>
                </li>
                <li class="actions-item">
                    <button class="btns all-btns">
                        <div class="btns-side">
                            <img src="../dist/img/Revolutionary-Editor/star.svg">
                            <span class="text">Star</span>
                        </div>
                        <span class="value">21,038</span>
                    </button>
                </li>
                <li class="actions-item">
                    <button class="btns all-btns">
                        <div class="btns-side">
                            <img src="../dist/img/Revolutionary-Editor/fork.svg">
                            <span class="text">Fork</span>
                        </div>
                        <span class="value">4,391</span>
                    </button>
                </li>
            </ul>
        </div>
    </div>
</section>
</main>
<script src="../dist/js/app.min.js"></script>
</body>

</html>
